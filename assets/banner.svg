<svg width="1280" height="360" viewBox="0 0 1280 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F"/>
      <stop offset="0.5" stop-color="#0C1C31"/>
      <stop offset="1" stop-color="#102744"/>
    </linearGradient>
    <linearGradient id="accent" x1="180" y1="70" x2="980" y2="290" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6EE7B7"/>
      <stop offset="0.5" stop-color="#60A5FA"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="soft" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#6EE7B7" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#60A5FA" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="blurGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1280" height="360" rx="28" fill="url(#bg)"/>

  <!-- Background grid -->
  <g opacity="0.12">
    <path d="M0 60H1280M0 120H1280M0 180H1280M0 240H1280M0 300H1280" stroke="#93C5FD"/>
    <path d="M80 0V360M200 0V360M320 0V360M440 0V360M560 0V360M680 0V360M800 0V360M920 0V360M1040 0V360M1160 0V360" stroke="#93C5FD"/>
  </g>

  <!-- Ambient glows -->
  <circle cx="1080" cy="70" r="120" fill="#60A5FA" opacity="0.18" filter="url(#blurGlow)"/>
  <circle cx="180" cy="310" r="110" fill="#6EE7B7" opacity="0.16" filter="url(#blurGlow)"/>
  <circle cx="1020" cy="300" r="90" fill="#A78BFA" opacity="0.14" filter="url(#blurGlow)"/>

  <!-- Left tech panel -->
  <g filter="url(#softShadow)">
    <rect x="56" y="52" width="300" height="256" rx="22" fill="#081423" stroke="#274B73"/>
    <rect x="76" y="78" width="260" height="42" rx="12" fill="#0C2036" stroke="#1F3E63"/>
    <circle cx="98" cy="99" r="6" fill="#6EE7B7"/>
    <circle cx="118" cy="99" r="6" fill="#60A5FA"/>
    <circle cx="138" cy="99" r="6" fill="#A78BFA"/>

    <!-- mini chart -->
    <rect x="76" y="138" width="120" height="74" rx="14" fill="#0A1B2E" stroke="#1F3E63"/>
    <path d="M90 194L110 178L128 184L150 160L174 168" stroke="#6EE7B7" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M90 194H182" stroke="#375A82" stroke-width="2"/>

    <!-- circuit lines -->
    <rect x="210" y="138" width="126" height="74" rx="14" fill="#0A1B2E" stroke="#1F3E63"/>
    <path d="M228 175H256V156H284V189H316" stroke="#60A5FA" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="228" cy="175" r="5" fill="#60A5FA"/>
    <circle cx="316" cy="189" r="5" fill="#60A5FA"/>

    <!-- code lines -->
    <rect x="76" y="228" width="260" height="56" rx="14" fill="#0A1B2E" stroke="#1F3E63"/>
    <rect x="96" y="245" width="132" height="8" rx="4" fill="#6EE7B7" opacity="0.9"/>
    <rect x="96" y="260" width="186" height="8" rx="4" fill="#93C5FD" opacity="0.85"/>
  </g>

  <!-- Main text -->
  <g filter="url(#softShadow)">
    <text x="420" y="132" fill="white" font-size="60" font-weight="700" font-family="Segoe UI, Inter, Arial, sans-serif">Abrar</text>
    <rect x="422" y="154" width="380" height="3" rx="1.5" fill="url(#accent)"/>
    <text x="420" y="196" fill="#CFE7FF" font-size="25" font-weight="500" font-family="Segoe UI, Inter, Arial, sans-serif">Python • Data Analysis • AI/ML • Electronics</text>
    <text x="420" y="236" fill="#8FB4D9" font-size="19" font-weight="400" font-family="Segoe UI, Inter, Arial, sans-serif">Building practical things with code, data, and hardware.</text>
  </g>

  <!-- Skill pills -->
  <g filter="url(#softShadow)" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="17" font-weight="600">
    <rect x="420" y="266" width="112" height="40" rx="20" fill="#0B1C30" stroke="#29557F"/>
    <text x="447" y="292" fill="#D9EEFF">Python</text>

    <rect x="548" y="266" width="152" height="40" rx="20" fill="#0B1C30" stroke="#29557F"/>
    <text x="580" y="292" fill="#D9EEFF">AI / ML</text>

    <rect x="716" y="266" width="162" height="40" rx="20" fill="#0B1C30" stroke="#29557F"/>
    <text x="748" y="292" fill="#D9EEFF">GitHub</text>

    <rect x="894" y="266" width="164" height="40" rx="20" fill="#0B1C30" stroke="#29557F"/>
    <text x="920" y="292" fill="#D9EEFF">Arduino</text>
  </g>

  <!-- Right-side abstract AI rings -->
  <g opacity="0.95">
    <circle cx="1120" cy="180" r="74" stroke="url(#accent)" stroke-width="3"/>
    <circle cx="1120" cy="180" r="46" stroke="#6EE7B7" stroke-opacity="0.8" stroke-width="2"/>
    <circle cx="1120" cy="180" r="10" fill="#6EE7B7"/>
    <circle cx="1120" cy="106" r="6" fill="#60A5FA"/>
    <circle cx="1194" cy="180" r="6" fill="#A78BFA"/>
    <circle cx="1120" cy="254" r="6" fill="#6EE7B7"/>
    <circle cx="1046" cy="180" r="6" fill="#60A5FA"/>
    <path d="M1120 106L1194 180L1120 254L1046 180L1120 106Z" stroke="#8FB4D9" stroke-opacity="0.55" stroke-width="1.5"/>
  </g>

  <!-- Accent corner -->
  <path d="M1216 44C1182 44 1154 72 1154 106" stroke="url(#accent)" stroke-width="5" stroke-linecap="round"/>
  <path d="M64 314C98 314 126 286 126 252" stroke="url(#accent)" stroke-width="5" stroke-linecap="round"/>
</svg>